<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vidyasetu.notes — Study Room</title>
    <meta name="description" content="Collaborative study room on Vidyasetu.notes." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../theme.js"></script>
    <link rel="stylesheet" href="home.css" />

    <!-- Jitsi Meet External API -->
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        .room-container {
            height: calc(100vh - 64px);
        }
        #jitsi-container {
            width: 100%;
            height: 100%;
            min-height: 0;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        #jitsi-container iframe {
            width: 100% !important;
            height: 100% !important;
            min-height: 100%;
            border-radius: 16px;
            position: absolute;
            top: 0;
            left: 0;
        }
        .control-bar {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .control-btn {
            transition: all 0.2s ease;
        }
        .control-btn:hover {
            transform: scale(1.08);
        }
        .control-btn.active {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
        }
        .control-btn.active .material-symbols-outlined {
            color: #ef4444;
        }

        .pre-join-screen {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .pulse-ring {
            animation: pulseRing 2s infinite;
        }
        @keyframes pulseRing {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.3); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>

<body class="bg-bg-dark font-display text-slate-100 min-h-screen flex flex-col overflow-hidden">

    <!-- ═══════════ HEADER ═══════════ -->
    <header class="flex items-center justify-between whitespace-nowrap px-5 md:px-8 py-3.5 z-30 bg-[#0e1015]/50 backdrop-blur-xl border-b border-white/[0.04] shrink-0" style="height: 64px;">
        <div class="flex items-center gap-3">
            <a href="groups.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined" style="font-size:22px;">arrow_back</span>
            </a>
            <div class="w-9 h-9 rounded-xl bg-emerald-500/20 flex items-center justify-center">
                <span class="material-symbols-outlined text-emerald-400" style="font-size:20px;">videocam</span>
            </div>
            <div>
                <h2 id="room-title" class="text-[15px] font-bold text-white">Study Room</h2>
                <p id="room-topic" class="text-[11px] text-slate-500">Peer Study Session</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span id="room-timer" class="text-[13px] font-mono text-slate-500 tabular-nums">00:00:00</span>
            <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-[11px] text-red-400 font-semibold">LIVE</span>
        </div>
    </header>

    <!-- ═══════════ PRE-JOIN SCREEN ═══════════ -->
    <div id="pre-join" class="pre-join-screen flex-1 flex flex-col items-center justify-center p-8">
        <div class="max-w-md w-full text-center">
            <!-- Animated icon -->
            <div class="pulse-ring w-24 h-24 rounded-3xl bg-emerald-500/15 border border-emerald-500/20 flex items-center justify-center mx-auto mb-8">
                <span class="material-symbols-outlined text-emerald-400" style="font-size:48px;">video_call</span>
            </div>

            <h2 class="text-lg font-bold tracking-tight">Vidyasetu.notes</h2>
            <h2 class="text-3xl font-black text-white mb-3">Ready to Study?</h2>
            <p id="pre-join-topic" class="text-slate-400 text-[15px] mb-8">Join the study room to start your peer session</p>

            <!-- Settings -->
            <div class="space-y-3 mb-8">
                <label class="flex items-center justify-between px-5 py-3.5 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-slate-400" style="font-size:20px;">videocam</span>
                        <span class="text-[14px] text-slate-300">Camera</span>
                    </div>
                    <label class="relative inline-flex cursor-pointer">
                        <input type="checkbox" id="toggle-camera" checked class="sr-only peer" />
                        <div class="w-10 h-5 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-5 rtl:peer-checked:after:-translate-x-5 after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                </label>

                <label class="flex items-center justify-between px-5 py-3.5 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-slate-400" style="font-size:20px;">mic</span>
                        <span class="text-[14px] text-slate-300">Microphone</span>
                    </div>
                    <label class="relative inline-flex cursor-pointer">
                        <input type="checkbox" id="toggle-mic" checked class="sr-only peer" />
                        <div class="w-10 h-5 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-5 rtl:peer-checked:after:-translate-x-5 after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                    </label>
                </label>
            </div>

            <button onclick="joinMeeting()" class="w-full px-8 py-4 rounded-2xl bg-emerald-500 hover:bg-emerald-600 text-white text-[16px] font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-emerald-500/20 hover:shadow-emerald-500/30">
                <span class="material-symbols-outlined" style="font-size:24px;">video_call</span>
                Join Study Room
            </button>

            <p class="mt-4 text-[12px] text-slate-600">
                Powered by Jitsi Meet • Free & Secure
            </p>
        </div>
    </div>

    <!-- ═══════════ VIDEO AREA ═══════════ -->
    <div id="meeting-area" class="hidden flex-1 flex flex-col room-container">
        <div id="jitsi-container" class="flex-1 m-4 mb-2 bg-[#0e1015] rounded-2xl border border-white/[0.06]">
            <!-- Jitsi Meet iframe will be injected here -->
        </div>

        <!-- Control Bar -->
        <div class="control-bar shrink-0 flex items-center justify-center gap-4 px-6 py-4">
            <button onclick="leaveRoom()" class="control-btn px-6 py-3 rounded-2xl bg-red-500/20 border border-red-500/30 text-red-400 font-semibold text-[13px] flex items-center gap-2 hover:bg-red-500/30 transition-all">
                <span class="material-symbols-outlined" style="font-size:20px;">call_end</span>
                Leave Room
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <script src="../login/supabase-config.js"></script>
    <script src="study-room.js"></script>
</body>

</html>
